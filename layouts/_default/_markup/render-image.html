{{ $image := .Page.Resources.GetMatch .Destination }}
{{ if $image }}
  {{ $processed := $image.Resize "1200x webp q75" }}
  <img src="{{ $processed.RelPermalink }}" alt="{{ .Text }}" class="inline-image border-4 border-black mx-auto w-full" {{ with .Title }}title="{{ . }}"{{ end }} />
{{ else }}
  <img src="{{ .Destination | safeURL }}" alt="{{ .Text }}" class="inline-image border-4 border-black mx-auto w-full" {{ with .Title }}title="{{ . }}"{{ end }} />
{{ end }}
